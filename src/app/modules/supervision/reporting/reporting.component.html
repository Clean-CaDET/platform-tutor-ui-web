<div class="flex-col" style="height: 100vh">
    <div class="flow-row gap learner-selector">
        <span *ngIf="!courses?.length">Nema aktivih modula.</span>
        <mat-form-field appearance="fill" style="margin-bottom: -1em; flex-grow: 1;" *ngIf="courses?.length">
            <mat-label>Posmatran modul</mat-label>
            <mat-select [(value)]="selectedCourseId" (selectionChange)="getGroups()">
                <mat-option *ngFor="let c of courses" [value]="c.id">
                    {{c.code}} - {{c.name}}
                </mat-option>
            </mat-select>
        </mat-form-field>
        <!-- <div class="flex-col gap grouped-learners" *ngIf="groups?.length">

                <div class="flex-col">

                        <mat-divider></mat-divider>
                        <div style="flex-grow: 1; padding: 10px;">
                            <small>{{l.name}} {{l.surname}} <br>{{l.index}}</small>
                        </div>
                    </div>
                </div>
            </div>
        </div> -->

        <div class="flex-col gap grouped-learners" *ngIf="groups?.length">
            <mat-accordion>
                <mat-expansion-panel *ngFor="let g of groups">
                    <mat-expansion-panel-header>
                        <mat-panel-title> {{g.name}} </mat-panel-title>
                    </mat-expansion-panel-header>
                    <div class="flex-col">
                        <div *ngFor="let l of g.learners"
                            class="theme-hover" (click)="selectLearner(l)" [ngClass]="{'theme-highlight-primary': selectedLearner?.index === l.index}">
                            <mat-divider></mat-divider>
                            <div style="flex-grow: 1; padding: 10px;">
                                <small>{{l.name}} {{l.surname}} <br>{{l.index}}</small>
                            </div>
                        </div>
                    </div>
                </mat-expansion-panel>
            </mat-accordion>
        </div>
    </div>
</div>
