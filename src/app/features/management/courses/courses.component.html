<div class="flex-row gap" style="height: 100%;">
  <cc-generic-table
    style="width: 40%"
    [title]="'Moduli'"
    [fieldConfiguration]="fields"
    [baseUrl]="baseUrl"
    (selectItem)="onSelect($event)" />
  @if (selectedCourse()) {
    <div class="flex-col gap" style="width: 20%;">
      <div style="height: 50%">
        <cc-generic-table
          [title]="'Grupe (' + selectedCourse()!.code + ')'"
          [fieldConfiguration]="groupFields"
          [baseUrl]="baseGroupUrl()"
          [noPagination]="true"
          (selectItem)="onSelectGroup($event)" />
      </div>
      <div style="height: 50%">
        <cc-owners [course]="selectedCourse()!" [allInstructors]="allInstructors()" />
      </div>
    </div>
  }
  @if (selectedGroup()) {
    <div style="width: calc(40% - 30px);">
      <cc-enrolled-learners [group]="selectedGroup()!" />
    </div>
  }
</div>
