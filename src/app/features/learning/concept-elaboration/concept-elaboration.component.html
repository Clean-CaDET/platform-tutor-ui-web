@let m = mode();
<div class="flex-col" style="height: 100%;">
  @if (m.kind === 'error') {
    <p>
      <b>{{ m.message }}</b> Osvežite stranicu i javite se nastavniku ako je problem i dalje prisutan.
    </p>
  }
  @if (m.kind === 'history') {
    <div class="flex-row" style="flex-grow: 1; overflow: hidden;">
      <div class="flex-col scrollable-panel" style="width: 50%;">
        <div style="max-width: 668px;">
          <h2 style="margin: 0;">{{ m.task.title }}</h2>
          <cc-markdown [data]="m.task.description" />
        </div>
      </div>
      <mat-divider vertical="true" />
      <div class="flex-col scrollable-panel" style="width: 50%; background-color: var(--mat-sys-surface-container-high);">
        <div style="max-width: 668px; width: 100%;">
          <cc-elaboration-attempt-history [attempts]="m.task.attempts" />
        </div>
      </div>
    </div>
    <div class="secondary-nav">
      <mat-divider />
      <div class="panel">
        <div class="flex-row gap" style="width: 50%; justify-content: flex-end;">
        @if (m.inProgress) {
          <button matButton="filled" (click)="continueSession()">
            <mat-icon>play_arrow</mat-icon>
            Dovrši staru elaboraciju
          </button>
        }
        </div>
        <div class="flex-row gap" style="width: 50%;">
        <button [matButton]="!m.inProgress && !m.hasCompleted ? 'filled' : 'elevated'" (click)="startSession()">
          <mat-icon>psychology</mat-icon>
          Započni novu elaboraciju
        </button>
        <a [matButton]="!m.inProgress && m.hasCompleted ? 'filled' : 'elevated'" [routerLink]="['/courses', courseId, 'units', unitId]">
          <mat-icon>article</mat-icon>
          Lekcija
        </a>
        </div>
      </div>
    </div>
  }

  @if (m.kind === 'session') {
    <cc-elaboration-session style="height: 100%;"
      #sessionRef [task]="m.task" [inProgress]="m.inProgress"
      [courseId]="courseId" (sessionEnded)="onSessionEnded()"
      (newSessionRequested)="onNewSessionRequested()" />
  }
</div>
