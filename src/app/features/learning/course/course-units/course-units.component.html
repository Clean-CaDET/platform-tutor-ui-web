<div class="flex-col dashboard">
  @for (unit of units(); track unit.id) {
    <mat-card appearance="outlined">
      <mat-card-header>
        <mat-icon matCardAvatar>article</mat-icon>
        <mat-card-title class="unit-title">{{ unit.name }}</mat-card-title>
        <span class="spacer"></span>
        @if (unit.isCompleted) {
          <mat-icon class="medal-icon" matTooltip="Lekcija uspešno savladana!">emoji_events</mat-icon>
        } @else if (unit.bestBefore) {
          <small [class.theme-warn]="unit.isOverdue">
            Najbolje završiti do: {{ unit.bestBefore | date:'dd.MM.' }}
          </small>
        }
      </mat-card-header>
      <mat-card-content>
        <p><cc-markdown>{{ unit.goals }}</cc-markdown></p>
      </mat-card-content>
      <mat-card-actions class="flex-row gap">
        <a [matButton]="!unit.isCompleted ? 'filled' : 'outlined'"
          [routerLink]="'units/' + unit.id">
          Pristupi
        </a>
        <span class="spacer"></span>
        <button matButton (click)="toggleNotes($index)" style="color: var(--mat-sys-on-surface)">
          @if (!notesVisible()[$index]) {
            <span>Prikaži <mat-icon>assignment</mat-icon></span>
          } @else {
            <span>Sakrij <mat-icon>assignment</mat-icon></span>
          }
        </button>
      </mat-card-actions>

      @if (notesLoaded()[$index]) {
        <div class="notes-container" [@slideInOut]="notesVisible()[$index] ? 'in' : 'out'">
          <mat-divider style="margin: 0 -20px"></mat-divider>
          <cc-note-manager [unitId]="unit.id!" [courseId]="course().id!" [embedded]="true" />
        </div>
      }
    </mat-card>
  }
</div>
