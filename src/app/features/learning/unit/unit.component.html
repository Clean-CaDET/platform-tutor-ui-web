<div style="height: 100%; width: 100%;">
  <div class="fixed">
    <button matButton class="navbar-button" (click)="sidenavOpened.set(!sidenavOpened())"
      [class.nav-active]="sidenavOpened()">
      <div>
        <mat-icon>assignment</mat-icon>
        @if (!sidenavOpened()) {
          <mat-icon>arrow_right</mat-icon>
        } @else {
          <mat-icon>arrow_left</mat-icon>
        }
        <br>
        Beleške
      </div>
    </button>
  </div>
  <mat-sidenav-container [hasBackdrop]="false" style="height: 100%;">
    <mat-sidenav mode="over" [opened]="sidenavOpened()" (closed)="sidenavOpened.set(false)">
      <div class="flex-col note-container">
        <cc-note-manager
          [unitId]="unitId()"
          [courseId]="courseId()"
          emptyStateText="Prostor za pitanja, ideje, nejasnoće i ostale beleške.">
        </cc-note-manager>
      </div>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
