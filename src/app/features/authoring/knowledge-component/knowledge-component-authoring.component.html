<div class="flex-col" style="height: 100vh;">
  @if (kc(); as kc) {
    <div class="secondary-nav" style="padding: 10px;">
      <span class="flex-row gap">
        <span class="flex-col">
          <span><b>{{ kc.code }}</b>: {{ kc.name }}</span>
          <small>Redosled: {{ kc.order }} | Minimalno minuta rada: {{ kc.expectedDurationInMinutes }}</small>
        </span>
        <span style="flex-grow: 1"></span>
        <span class="flex-row" style="gap: 30px">
          <span class="flex-row gap">
            <a matButton="outlined" matTooltip="Komponente znanja"
               [routerLink]="['/authoring', courseId(), 'units']"
               [queryParams]="{ unit: kc.knowledgeUnitId, mode: 'kc' }">
              <span><mat-icon>account_tree</mat-icon></span>
            </a>
            @if (prevKc(); as prev) {
              <a matButton="outlined" [matTooltip]="'Komponenta: ' + prev.name"
                 [routerLink]="['/authoring', courseId(), 'units', prev.knowledgeUnitId, 'knowledge-components', prev.id, 'instruction']">
                <span><mat-icon>navigate_before</mat-icon></span>
              </a>
            } @else {
              <button matButton="outlined" disabled matTooltip="Nema prethodne komponente">
                <span><mat-icon>navigate_before</mat-icon></span>
              </button>
            }
            @if (nextKc(); as next) {
              <a matButton="outlined" [matTooltip]="'Komponenta: ' + next.name"
                 [routerLink]="['/authoring', courseId(), 'units', next.knowledgeUnitId, 'knowledge-components', next.id, 'instruction']">
                <span><mat-icon>navigate_next</mat-icon></span>
              </a>
            } @else {
              <button matButton="outlined" disabled matTooltip="Nema sledeće komponente">
                <span><mat-icon>navigate_next</mat-icon></span>
              </button>
            }
          </span>
          <span class="flex-row gap">
            <a matButton="outlined" matTooltip="Gradivo"
               [routerLink]="['/authoring', courseId(), 'units', kc.knowledgeUnitId, 'knowledge-components', kc.id, 'instruction']"
               routerLinkActive="active-tab">
              <span><mat-icon>library_books</mat-icon></span>
            </a>
            <a matButton="outlined" matTooltip="Pitanja"
               [routerLink]="['/authoring', courseId(), 'units', kc.knowledgeUnitId, 'knowledge-components', kc.id, 'assessments']"
               routerLinkActive="active-tab">
              <span><mat-icon>quiz</mat-icon></span>
            </a>
          </span>
        </span>
      </span>
    </div>
    <mat-divider></mat-divider>
  }
  <div style="overflow-y: auto; padding: 20px" #scroller>
    <router-outlet />
  </div>
</div>
